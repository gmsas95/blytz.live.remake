version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: blytzlive-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blytz_marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-blytz_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - pg_isready -U ${POSTGRES_USER:-blytz_user} -d ${POSTGRES_DB:-blytz_marketplace}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: blytzlive-redis
    restart: unless-stopped
    env_file:
      - ./.env
    command: >
      sh -c 'if [ -n "$${REDIS_PASSWORD}" ]; then redis-server --appendonly yes
      --requirepass $${REDIS_PASSWORD}; else redis-server --appendonly yes; fi'
    volumes:
      - redis_data:/data
    networks:
      - dokploy-network
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - if [ -n "$${REDIS_PASSWORD}" ]; then redis-cli -a $${REDIS_PASSWORD}
          ping; else redis-cli ping; fi
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    container_name: blytzlive-backend
    restart: unless-stopped
    environment:
      ENV: production
      DB_SSL_MODE: disable
      PORT: 8080
      DB_HOST: 172.21.0.2
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-blytz_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-blytz_marketplace}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      API_URL: ${API_URL:-https://api.blytz.app}
      FRONTEND_URL: ${FRONTEND_URL:-https://blytz.app}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.http.services.blytzlive-backend.loadbalancer.server.port=8080
      - traefik.http.routers.blytzlive-backend.rule=Host(`api.blytz.app`)
      - traefik.http.routers.blytzlive-backend.entrypoints=websecure
      - traefik.http.routers.blytzlive-backend.tls.certresolver=letsencrypt
      - traefik.http.routers.blytzlive-backend.service=blytzlive-backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    container_name: blytzlive-frontend
    restart: unless-stopped
    environment:
      ENV: production
      PORT: 3000
      VITE_API_URL: ${API_URL:-https://api.blytz.app}/api/v1
      VITE_APP_NAME: Blytz.app Live Auction Marketplace
      VITE_APP_URL: ${FRONTEND_URL:-https://blytz.app}
    depends_on:
      - backend
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.http.services.blytzlive-frontend.loadbalancer.server.port=3000
      - traefik.http.routers.blytzlive-frontend.rule=Host(`blytz.app`) ||
        Host(`staging.blytz.app`)
      - traefik.http.routers.blytzlive-frontend.entrypoints=websecure
      - traefik.http.routers.blytzlive-frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.blytzlive-frontend.service=blytzlive-frontend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  dokploy-network:
    external: true
    name: dokploy-network
